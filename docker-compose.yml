# Fase 1: solo Postgres. La API y Astro se añaden en la Fase 5 (deploy).
services:
  postgres:
    image: postgres:17-alpine
    container_name: rf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clu
      POSTGRES_PASSWORD: kiqhy9-venjom-bYhzat
      POSTGRES_DB: reposteria
    ports:
      - "5432:5432"
    volumes:
      - rf-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clu -d reposteria"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rf-pgdata:
