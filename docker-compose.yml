# Desarrollo local: solo Postgres. La API y los frontends corren con pnpm dev.
# Nombre distinto al de prod (rf-postgres) para poder tener ambos stacks
# en la misma máquina sin choque de container_name.
services:
  postgres:
    image: postgres:17-alpine
    container_name: rf-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: clu
      POSTGRES_PASSWORD: kiqhy9-venjom-bYhzat
      POSTGRES_DB: reposteria
    ports:
      - "5432:5432"
    volumes:
      - rf-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clu -d reposteria"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rf-pgdata:
