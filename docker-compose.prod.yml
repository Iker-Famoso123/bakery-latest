# Producción (Raspberry Pi). Levanta con:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# No publica puertos al host: se expone por Nginx Proxy Manager (NPM), que
# alcanza los contenedores por NOMBRE a través de la red externa `proxy`.
# Prepara esa red una sola vez (ver DEPLOY.md):
#   docker network create proxy
#   docker network connect proxy <contenedor-de-NPM>

# Proyecto propio: aísla contenedores/volúmenes del stack de desarrollo.
name: reposteria-prod

services:
  postgres:
    image: postgres:17-alpine
    container_name: rf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - rf-pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: rf-api:latest
    container_name: rf-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      PORT: 3000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      REFRESH_TTL_DAYS: ${REFRESH_TTL_DAYS:-30}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    networks:
      - internal # habla con Postgres
      - proxy # NPM → rf-api:3000 (api.reposteriafamoso.com)

  public:
    build:
      context: .
      dockerfile: apps/public/Dockerfile
    image: rf-public:latest
    container_name: rf-public
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_URL: http://api:3000 # llama a la API por la red interna
      HOST: 0.0.0.0
      PORT: 4321
    networks:
      - internal # para alcanzar la API
      - proxy # NPM → rf-public:4321 (reposteriafamoso.com)

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_URL: ${ADMIN_API_URL} # p. ej. https://api.reposteriafamoso.com
    image: rf-admin:latest
    container_name: rf-admin
    restart: unless-stopped
    networks:
      - proxy # NPM → rf-admin:80 (admin.reposteriafamoso.com)

networks:
  internal: # privada del stack (Postgres nunca sale de aquí)
  proxy:
    external: true # compartida con Nginx Proxy Manager

volumes:
  rf-pgdata:
