server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Assets con hash: caché larga e inmutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: cualquier ruta desconocida sirve index.html (React Router se encarga).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
